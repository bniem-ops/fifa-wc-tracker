<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Knockout Bracket — World Cup 26 Tracker</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="hero">
    <nav class="page-nav">
      <a href="index.html" class="nav-link">Tracker</a>
      <a href="bracket.html" class="nav-link active">Bracket</a>
      <a href="admin.html" class="nav-link">Admin</a>
    </nav>
    <div class="hero-inner">
      <div>
        <h1>Knockout <span class="accent">Bracket</span></h1>
        <div class="subtitle">Round of 32 through the Final — tap any matchup for details</div>
      </div>
    </div>
  </div>

  <div class="wrap">
    <p id="bracket-status" class="bracket-status" style="display:none;"></p>

    <div class="bracket-scroll">
      <div class="bracket-columns" id="bracket-columns"></div>
    </div>

    <div class="section-label">Third Place Match</div>
    <div class="third-place-box" id="third-place-box"></div>

    <footer>
      <span>Round of 32 third-place slots follow FIFA's official Annex C allocation table. Later rounds advance automatically once real results are entered in Admin.</span>
      <a href="index.html">Tracker</a>
    </footer>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script type="module" src="js/bracket.js"></script>
</body>
</html>
